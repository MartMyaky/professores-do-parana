<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Professores PR</title>

<style>

body{
background:#d9d9d9;
font-family:"Segoe UI",sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* caixa */

.board{
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
width:90%;
max-width:900px;
border:4px solid #4a90e2;
z-index:2;
}

/* avatar */

.bot{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.bot img{
width:80px;
height:80px;
border-radius:50%;
border:3px solid #4a90e2;
}

.title{
font-size:26px;
color:#2b5da8;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

#text{
white-space:pre-line;
font-size:20px;
line-height:1.6;
color:#333;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}

/* PORTAL */

.portal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:200px;
height:200px;
border-radius:50%;
border:6px solid #4a90e2;
box-shadow:
0 0 20px #4a90e2,
0 0 60px #4a90e2,
inset 0 0 20px #4a90e2;
animation:spin 2s linear infinite;
opacity:0;
}

.portal.open{
opacity:1;
animation:spin 0.6s linear infinite, grow 1.5s forwards;
}

@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0deg)}
to{transform:translate(-50%,-50%) rotate(360deg)}
}

@keyframes grow{
to{
width:3000px;
height:3000px;
}
}

</style>
</head>

<body>

<div class="portal" id="portal"></div>

<div class="board">

<div class="title">
📚 Portal Professores do Paraná
</div>

<div class="bot">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

<div><b>Myaky Bot</b></div>

</div>

<div id="text"></div><span class="cursor">|</span>

</div>

<script>

const lines=[

"🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲",
"Bem vindo(a) ao portal profe do Paraná",
"🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲",
"Meu nome é Myaky Bot",
"Eu fui feito para ajudar os professores",
"🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲",
"Então agora vou iniciar o script de inicialização",
"do sistema do site prof-mr.site",
"🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲▫️🔲",
"Inicializando sistema e ativando..."
];

const text=document.getElementById("text");
const portal=document.getElementById("portal");

let line=0;
let char=0;

function type(){

if(line>=lines.length){

setTimeout(()=>{

portal.classList.add("open");

setTimeout(()=>{

window.location.href="https://prof-mr.site/Home.html";

},1500);

},1000);

return;

}

if(char<lines[line].length){

text.innerHTML+=lines[line].charAt(char);
char++;

setTimeout(type,35);

}else{

text.innerHTML+="\n";
line++;
char=0;

setTimeout(type,400);

}

}

setTimeout(type,700);

</script>

</body>
</html>
