<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Professores PR</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root{
      --blue-1:#2563eb;
      --blue-2:#60a5fa;
      --blue-3:#93c5fd;
      --blue-4:#dbeafe;
      --cyan:#7dd3fc;
      --gold-1:#facc15;
      --gold-2:#fde68a;
      --dark:#0f172a;
      --dark-2:#1e293b;
      --text:#22324d;
      --muted:#64748b;
    }

    body{
      min-height:100vh;
      font-family:"Segoe UI",system-ui,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(96,165,250,.30), transparent 18%),
        radial-gradient(circle at 85% 75%, rgba(59,130,246,.20), transparent 22%),
        radial-gradient(circle at 76% 10%, rgba(125,211,252,.16), transparent 16%),
        linear-gradient(135deg, #eef6ff 0%, #d9eafe 40%, #cddfff 100%);
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,255,255,.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.09) 1px, transparent 1px);
      background-size:30px 30px;
      opacity:.28;
      pointer-events:none;
    }

    .bg-orb{
      position:absolute;
      border-radius:50%;
      filter:blur(34px);
      opacity:.44;
      pointer-events:none;
      animation:floatOrb 10s ease-in-out infinite;
    }

    .bg-orb.one{
      width:280px;
      height:280px;
      background:#60a5fa;
      top:6%;
      left:5%;
    }

    .bg-orb.two{
      width:340px;
      height:340px;
      background:#93c5fd;
      right:3%;
      bottom:1%;
      animation-delay:-4s;
    }

    .bg-orb.three{
      width:170px;
      height:170px;
      background:#38bdf8;
      left:14%;
      bottom:16%;
      animation-delay:-2s;
    }

    .stars{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .star{
      position:absolute;
      width:4px;
      height:4px;
      background:white;
      border-radius:50%;
      box-shadow:0 0 8px rgba(255,255,255,.95);
      opacity:.7;
      animation:starBlink 2.8s ease-in-out infinite;
    }

    .star:nth-child(1){ top:8%; left:20%; animation-delay:.2s; }
    .star:nth-child(2){ top:18%; left:68%; animation-delay:1.2s; }
    .star:nth-child(3){ top:30%; left:84%; animation-delay:.8s; }
    .star:nth-child(4){ top:72%; left:12%; animation-delay:1.8s; }
    .star:nth-child(5){ top:78%; left:75%; animation-delay:.5s; }
    .star:nth-child(6){ top:58%; left:58%; animation-delay:1.4s; }

    @keyframes starBlink{
      0%,100%{ transform:scale(.8); opacity:.35; }
      50%{ transform:scale(1.6); opacity:1; }
    }

    @keyframes floatOrb{
      0%,100%{ transform:translate(0,0) scale(1); }
      50%{ transform:translate(12px,-18px) scale(1.05); }
    }

    .flash{
      position:fixed;
      inset:0;
      background:radial-gradient(circle, rgba(255,255,255,.98) 0%, rgba(255,255,255,.55) 30%, rgba(255,255,255,0) 75%);
      opacity:0;
      pointer-events:none;
      z-index:20;
    }

    .flash.active{
      animation:flashBoom .7s ease forwards;
    }

    @keyframes flashBoom{
      0%{ opacity:0; transform:scale(.7); }
      25%{ opacity:.95; transform:scale(1); }
      100%{ opacity:0; transform:scale(1.4); }
    }

    .portal-wrap{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      pointer-events:none;
      z-index:1;
    }

    .portal{
      position:relative;
      width:240px;
      height:240px;
      opacity:0;
      transform:scale(.65);
      transition:opacity .4s ease, transform .4s ease;
    }

    .portal.show{
      opacity:1;
      transform:scale(1);
    }

    .ring,
    .ring2,
    .ring3,
    .ring4,
    .core,
    .portal-wave{
      position:absolute;
      border-radius:50%;
    }

    .ring{
      inset:0;
      border:6px solid rgba(37,99,235,.92);
      box-shadow:
        0 0 22px rgba(37,99,235,.9),
        0 0 70px rgba(96,165,250,.65),
        inset 0 0 18px rgba(255,255,255,.55);
      animation:spin 3.2s linear infinite;
    }

    .ring2{
      inset:12px;
      border:2px dashed rgba(219,234,254,.95);
      box-shadow:0 0 26px rgba(147,197,253,.75);
      animation:spinReverse 2.2s linear infinite;
    }

    .ring3{
      inset:28px;
      border:3px solid rgba(125,211,252,.85);
      box-shadow:
        0 0 18px rgba(125,211,252,.9),
        inset 0 0 18px rgba(255,255,255,.45);
      animation:pulseRing 1.5s ease-in-out infinite;
    }

    .ring4{
      inset:44px;
      border:2px solid rgba(255,255,255,.7);
      box-shadow:0 0 14px rgba(255,255,255,.7);
      animation:spin 4.5s linear infinite;
    }

    .core{
      inset:62px;
      background:
        radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(147,197,253,.97) 38%, rgba(37,99,235,.96) 100%);
      box-shadow:
        0 0 26px rgba(255,255,255,.95),
        0 0 70px rgba(96,165,250,.85);
      animation:corePulse 1.2s ease-in-out infinite;
    }

    .portal-wave{
      inset:-16px;
      border:2px solid rgba(255,255,255,.45);
      opacity:0;
    }

    .portal.show .portal-wave{
      animation:wavePulse 1.2s ease-out infinite;
    }

    .portal-particle{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:white;
      box-shadow:0 0 14px rgba(255,255,255,1);
      animation:orbitPulse 2.5s linear infinite;
    }

    .portal-particle.p1{ top:-4px; left:50%; animation-delay:0s; }
    .portal-particle.p2{ top:50%; right:-4px; animation-delay:-.6s; }
    .portal-particle.p3{ bottom:-4px; left:50%; animation-delay:-1.2s; }
    .portal-particle.p4{ top:50%; left:-4px; animation-delay:-1.8s; }

    .portal.opening{
      animation:portalExpand 1.6s ease forwards;
    }

    @keyframes spin{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    @keyframes spinReverse{
      from{ transform:rotate(360deg); }
      to{ transform:rotate(0deg); }
    }

    @keyframes pulseRing{
      0%,100%{ transform:scale(1); opacity:.82; }
      50%{ transform:scale(1.07); opacity:1; }
    }

    @keyframes corePulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.12); }
    }

    @keyframes orbitPulse{
      0%,100%{ transform:scale(.9); opacity:.55; }
      50%{ transform:scale(1.45); opacity:1; }
    }

    @keyframes wavePulse{
      0%{ transform:scale(.9); opacity:.8; }
      100%{ transform:scale(1.35); opacity:0; }
    }

    @keyframes portalExpand{
      0%{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
      }
      100%{
        opacity:1;
        transform:scale(16);
        filter:blur(4px);
      }
    }

    .board{
      position:relative;
      z-index:3;
      width:min(940px,92vw);
      padding:36px 34px 26px;
      border-radius:30px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:
        0 24px 70px rgba(15,23,42,.18),
        inset 0 1px 0 rgba(255,255,255,.62);
      overflow:hidden;
      animation:boardEnter 1s ease;
    }

    .board::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, rgba(255,255,255,.22), transparent 35%, rgba(96,165,250,.08));
      pointer-events:none;
    }

    .board::after{
      content:"";
      position:absolute;
      top:-120%;
      left:-30%;
      width:70%;
      height:260%;
      transform:rotate(14deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      animation:glassSweep 7s linear infinite;
      pointer-events:none;
    }

    @keyframes boardEnter{
      from{ opacity:0; transform:translateY(30px) scale(.97); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }

    @keyframes glassSweep{
      0%{ left:-60%; }
      100%{ left:140%; }
    }

    .title{
      text-align:center;
      font-size:clamp(26px,3vw,36px);
      font-weight:900;
      color:#14325b;
      letter-spacing:.2px;
      text-shadow:0 2px 16px rgba(37,99,235,.12);
      position:relative;
    }

    .title span{
      background:linear-gradient(90deg, #123765, #2563eb, #7dd3fc, #123765);
      background-size:200% auto;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:titleShine 4s linear infinite;
    }

    @keyframes titleShine{
      0%{ background-position:0% center; }
      100%{ background-position:200% center; }
    }

    .subtitle{
      margin:10px 0 28px;
      text-align:center;
      color:var(--muted);
      font-size:clamp(14px,1.8vw,16px);
    }

    .top{
      display:flex;
      gap:20px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .bot{
      display:flex;
      align-items:center;
      gap:18px;
      flex:1 1 380px;
      min-width:280px;
    }

    .bot-avatar{
      width:118px;
      height:146px;
      position:relative;
      flex-shrink:0;
      animation:floatBot 3s ease-in-out infinite;
      filter:drop-shadow(0 14px 24px rgba(37,99,235,.18));
    }

    @keyframes floatBot{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-9px); }
    }

    /* CARTOLA PREMIUM */
    .hat{
      position:absolute;
      top:-2px;
      left:50%;
      transform:translateX(-50%);
      width:90px;
      height:62px;
      z-index:7;
      pointer-events:none;
      animation:hatSwing 2.8s ease-in-out infinite;
      transform-origin:center bottom;
    }

    .hat-top{
      position:absolute;
      top:0;
      left:50%;
      transform:translateX(-50%);
      width:52px;
      height:36px;
      border-radius:12px 12px 4px 4px;
      background:
        linear-gradient(180deg, #2b3240 0%, #0f172a 65%, #050b15 100%);
      border:1px solid rgba(255,255,255,.05);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.08),
        inset -6px 0 10px rgba(255,255,255,.02),
        0 8px 18px rgba(0,0,0,.35);
    }

    .hat-band{
      position:absolute;
      top:22px;
      left:50%;
      transform:translateX(-50%);
      width:56px;
      height:9px;
      border-radius:999px;
      background:linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-1));
      box-shadow:
        0 0 12px rgba(250,204,21,.4),
        inset 0 1px 1px rgba(255,255,255,.4);
      z-index:2;
    }

    .hat-band::after{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:inherit;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
      animation:bandShine 2s linear infinite;
    }

    .hat-brim{
      position:absolute;
      top:32px;
      left:50%;
      transform:translateX(-50%);
      width:90px;
      height:13px;
      border-radius:999px;
      background:
        linear-gradient(180deg, #394355 0%, #111827 70%, #050b15 100%);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.07),
        0 8px 14px rgba(0,0,0,.25);
    }

    .hat-glow{
      position:absolute;
      left:50%;
      top:18px;
      transform:translateX(-50%);
      width:66px;
      height:26px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(250,204,21,.35), rgba(250,204,21,0));
      filter:blur(8px);
      z-index:1;
    }

    @keyframes hatSwing{
      0%,100%{ transform:translateX(-50%) rotate(0deg); }
      25%{ transform:translateX(-50%) rotate(-3deg); }
      50%{ transform:translateX(-50%) rotate(0deg); }
      75%{ transform:translateX(-50%) rotate(3deg); }
    }

    @keyframes bandShine{
      0%{ transform:translateX(-120%); }
      100%{ transform:translateX(140%); }
    }

    /* CABEÇA */
    .bot-head{
      position:absolute;
      left:10px;
      bottom:0;
      width:98px;
      height:98px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #ffffff 0%, #eef7ff 30%, #cfe7ff 65%, #8fc1ff 100%);
      border:3px solid rgba(37,99,235,.95);
      box-shadow:
        0 0 20px rgba(37,99,235,.32),
        0 0 50px rgba(147,197,253,.28),
        inset 0 0 24px rgba(255,255,255,.9);
      overflow:hidden;
      z-index:2;
    }

    .bot-head::before{
      content:"";
      position:absolute;
      width:34px;
      height:34px;
      border-radius:50%;
      top:14px;
      left:16px;
      background:rgba(255,255,255,.72);
      filter:blur(2px);
    }

    .bot-head::after{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.5);
      pointer-events:none;
    }

    /* ÓCULOS AJUSTADOS */
    .glasses{
      position:absolute;
      left:50%;
      top:33px;
      transform:translateX(-50%);
      width:60px;
      height:22px;
      z-index:5;
      pointer-events:none;
      filter:drop-shadow(0 0 10px rgba(96,165,250,.35));
    }

    .glass{
      position:absolute;
      top:0;
      width:22px;
      height:18px;
      border:3px solid #2563eb;
      border-radius:7px;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(125,211,252,.05));
      box-shadow:
        inset 0 0 10px rgba(255,255,255,.18),
        0 0 10px rgba(37,99,235,.35);
      overflow:hidden;
      animation:glassGlow 1.8s ease-in-out infinite;
    }

    .glass.left{ left:0; }
    .glass.right{ right:0; animation-delay:.4s; }

    .glass::before{
      content:"";
      position:absolute;
      top:-4px;
      left:-20px;
      width:14px;
      height:34px;
      transform:rotate(22deg);
      background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.9), rgba(255,255,255,0));
      opacity:.9;
      animation:glassReflect 2.3s linear infinite;
    }

    .bridge{
      position:absolute;
      top:6px;
      left:50%;
      transform:translateX(-50%);
      width:8px;
      height:4px;
      border-radius:999px;
      background:#2563eb;
      box-shadow:0 0 10px rgba(37,99,235,.45);
    }

    @keyframes glassReflect{
      0%{ left:-22px; opacity:0; }
      15%{ opacity:1; }
      55%{ left:34px; opacity:1; }
      100%{ left:46px; opacity:0; }
    }

    @keyframes glassGlow{
      0%,100%{ box-shadow:inset 0 0 12px rgba(255,255,255,.2), 0 0 10px rgba(37,99,235,.28); }
      50%{ box-shadow:inset 0 0 14px rgba(255,255,255,.26), 0 0 16px rgba(96,165,250,.48); }
    }

    /* OLHOS AJUSTADOS */
    .eye{
      position:absolute;
      top:36px;
      width:12px;
      height:12px;
      border-radius:50%;
      background:radial-gradient(circle, #ffffff 0%, #7dd3fc 18%, #2563eb 55%, #0f3f90 100%);
      box-shadow:
        0 0 8px rgba(125,211,252,.8),
        0 0 16px rgba(37,99,235,.55);
      z-index:3;
      animation:
        blinkEye 4.8s infinite,
        eyePulse 1.4s ease-in-out infinite;
    }

    .eye.left{ left:24px; }
    .eye.right{ right:24px; animation-delay:0s,.35s; }

    .eye::before{
      content:"";
      position:absolute;
      inset:-6px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(125,211,252,.45), rgba(125,211,252,0));
      animation:eyeAura 1.4s ease-in-out infinite;
    }

    .eye::after{
      content:"";
      position:absolute;
      top:2px;
      left:3px;
      width:4px;
      height:4px;
      border-radius:50%;
      background:rgba(255,255,255,.95);
      box-shadow:0 0 6px rgba(255,255,255,.95);
    }

    @keyframes blinkEye{
      0%,44%,48%,100%{ transform:scaleY(1); }
      46%{ transform:scaleY(.08); }
    }

    @keyframes eyePulse{
      0%,100%{ box-shadow:0 0 8px rgba(125,211,252,.7), 0 0 16px rgba(37,99,235,.45); }
      50%{ box-shadow:0 0 12px rgba(125,211,252,1), 0 0 24px rgba(37,99,235,.8); }
    }

    @keyframes eyeAura{
      0%,100%{ transform:scale(1); opacity:.45; }
      50%{ transform:scale(1.25); opacity:.8; }
    }

    .mouth{
      position:absolute;
      left:50%;
      top:63px;
      width:22px;
      height:8px;
      transform:translateX(-50%);
      background:linear-gradient(180deg, #1d4f91, #13376b);
      border-radius:0 0 18px 18px;
      z-index:3;
      box-shadow:0 0 8px rgba(29,79,145,.22);
    }

    .bot-avatar.talking .mouth{
      animation:talkMouth .16s infinite alternate;
    }

    @keyframes talkMouth{
      0%{
        width:18px;
        height:7px;
        border-radius:0 0 18px 18px;
      }
      40%{
        width:14px;
        height:16px;
        border-radius:50%;
      }
      100%{
        width:24px;
        height:10px;
        border-radius:0 0 18px 18px;
      }
    }

    .bot-text{
      min-width:0;
    }

    .bot-name{
      font-size:22px;
      font-weight:900;
      color:#16325c;
      margin-bottom:4px;
    }

    .bot-role{
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .controls{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      flex:1 1 220px;
      min-width:220px;
    }

    .skip-btn{
      position:relative;
      overflow:hidden;
      border:none;
      background:linear-gradient(135deg, #2563eb, #60a5fa, #7dd3fc);
      background-size:200% auto;
      color:white;
      font-size:15px;
      font-weight:900;
      padding:15px 22px;
      border-radius:18px;
      cursor:pointer;
      box-shadow:0 16px 30px rgba(37,99,235,.28);
      transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
      animation:btnGlow 2.8s linear infinite;
    }

    .skip-btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-130%;
      width:90%;
      height:100%;
      transform:skewX(-25deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
      animation:btnShine 2.8s linear infinite;
    }

    .skip-btn:hover{
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 22px 40px rgba(37,99,235,.34);
      filter:brightness(1.05);
    }

    .skip-btn:active{
      transform:translateY(0) scale(.99);
    }

    @keyframes btnGlow{
      0%{ background-position:0% center; }
      100%{ background-position:200% center; }
    }

    @keyframes btnShine{
      0%{ left:-130%; }
      100%{ left:150%; }
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(37,99,235,.45), transparent);
      margin:10px 0 20px;
    }

    .terminal{
      position:relative;
      min-height:235px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.64), rgba(239,247,255,.76));
      border:1px solid rgba(147,197,253,.45);
      padding:22px 20px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.55),
        0 12px 24px rgba(15,23,42,.04);
      overflow:hidden;
    }

    .terminal::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.08), transparent 20%, rgba(96,165,250,.04));
      pointer-events:none;
    }

    .terminal-top{
      display:flex;
      gap:8px;
      margin-bottom:16px;
    }

    .dot{
      width:11px;
      height:11px;
      border-radius:50%;
      background:#bfdbfe;
      box-shadow:0 0 8px rgba(96,165,250,.35);
    }

    #text{
      white-space:pre-line;
      font-size:clamp(16px,2vw,21px);
      line-height:1.75;
      color:#26364f;
      display:inline;
      font-weight:500;
    }

    .cursor{
      display:inline-block;
      margin-left:2px;
      color:#2563eb;
      font-weight:800;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      50%{ opacity:0; }
    }

    .progress-area{
      margin-top:20px;
    }

    .progress-info{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .progress-label{
      color:var(--muted);
      font-size:14px;
      font-weight:700;
    }

    .progress-percent{
      color:#16325c;
      font-size:14px;
      font-weight:900;
    }

    .progress-wrap{
      width:100%;
      height:13px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(147,197,253,.28);
      box-shadow:inset 0 1px 3px rgba(15,23,42,.08);
    }

    .progress-bar{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, #2563eb, #60a5fa, #7dd3fc, #dbeafe);
      background-size:200% auto;
      box-shadow:0 0 15px rgba(37,99,235,.35);
      transition:width .28s ease;
      animation:progressShine 2.4s linear infinite;
    }

    @keyframes progressShine{
      0%{ background-position:0% center; }
      100%{ background-position:200% center; }
    }

    .foot-note{
      margin-top:14px;
      text-align:center;
      color:#6b7d99;
      font-size:13px;
    }

    @media (max-width:700px){
      .board{
        padding:24px 18px 20px;
        border-radius:22px;
      }

      .top{
        gap:14px;
      }

      .controls{
        width:100%;
        justify-content:flex-start;
      }

      .skip-btn{
        width:100%;
      }

      .terminal{
        min-height:255px;
        padding:18px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-orb one"></div>
  <div class="bg-orb two"></div>
  <div class="bg-orb three"></div>

  <div class="stars">
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
  </div>

  <div class="flash" id="flash"></div>

  <div class="portal-wrap">
    <div class="portal" id="portal">
      <div class="ring"></div>
      <div class="ring2"></div>
      <div class="ring3"></div>
      <div class="ring4"></div>
      <div class="portal-wave"></div>
      <div class="core"></div>
      <div class="portal-particle p1"></div>
      <div class="portal-particle p2"></div>
      <div class="portal-particle p3"></div>
      <div class="portal-particle p4"></div>
    </div>
  </div>

  <div class="board">
    <h1 class="title"><span>📚 Portal Professores do Paraná</span></h1>
    <div class="subtitle">
      Recursos, planejamento, BNCC, inclusão e apoio pedagógico com IA
    </div>

    <div class="top">
      <div class="bot">
        <div class="bot-avatar" id="myakyBot">
          <div class="hat">
            <div class="hat-glow"></div>
            <div class="hat-top"></div>
            <div class="hat-band"></div>
            <div class="hat-brim"></div>
          </div>

          <div class="bot-head">
            <div class="glasses">
              <div class="glass left"></div>
              <div class="bridge"></div>
              <div class="glass right"></div>
            </div>

            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
          </div>
        </div>

        <div class="bot-text">
          <div class="bot-name">Myaky Bot</div>
          <div class="bot-role">
            Assistente educacional para apoiar professores com organização, ideias e recursos didáticos.
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="skip-btn" id="skipBtn">Entrar agora</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="terminal">
      <div class="terminal-top">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <span id="text"></span><span class="cursor">|</span>
    </div>

    <div class="progress-area">
      <div class="progress-info">
        <div class="progress-label">Carregando ambiente pedagógico</div>
        <div class="progress-percent" id="progressPercent">0%</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="foot-note">
      Preparando a experiência inicial do portal...
    </div>
  </div>

  <script>
    const lines = [
      "Olá, professor(a). Seja bem-vindo(a).",
      "Você está entrando no Portal Professores do Paraná.",
      "",
      "Eu sou o Myaky Bot.",
      "Fui criado para apoiar o seu planejamento, a sua prática docente e a organização do seu dia a dia.",
      "",
      "Preparando recursos pedagógicos...",
      "Conectando ferramentas educacionais...",
      "Ativando ambiente inteligente do portal...",
      "",
      "Portal pronto.",
      "Abrindo sua experiência pedagógica..."
    ];

    const text = document.getElementById("text");
    const portal = document.getElementById("portal");
    const myakyBot = document.getElementById("myakyBot");
    const progressBar = document.getElementById("progressBar");
    const progressPercent = document.getElementById("progressPercent");
    const skipBtn = document.getElementById("skipBtn");
    const flash = document.getElementById("flash");

    let line = 0;
    let char = 0;
    let talkTimer = null;
    let redirecting = false;

    function botTalk(){
      myakyBot.classList.add("talking");
      clearTimeout(talkTimer);
      talkTimer = setTimeout(() => {
        myakyBot.classList.remove("talking");
      }, 110);
    }

    function updateProgress(){
      const totalChars = lines.join("\n").length;
      const currentChars = text.textContent.length;
      const percent = Math.max(0, Math.min(100, Math.round((currentChars / totalChars) * 100)));
      progressBar.style.width = percent + "%";
      progressPercent.textContent = percent + "%";
    }

    function cinematicEnter(){
      if(redirecting) return;
      redirecting = true;

      myakyBot.classList.remove("talking");
      progressBar.style.width = "100%";
      progressPercent.textContent = "100%";

      setTimeout(() => {
        portal.classList.add("show");

        setTimeout(() => {
          flash.classList.add("active");

          setTimeout(() => {
            portal.classList.add("opening");

            setTimeout(() => {
              window.location.href = "https://prof-mr.site/Home.html";
            }, 1400);

          }, 180);
        }, 700);
      }, 300);
    }

    function type(){
      if(line >= lines.length){
        updateProgress();
        cinematicEnter();
        return;
      }

      if(char < lines[line].length){
        text.textContent += lines[line].charAt(char);
        char++;
        botTalk();
        updateProgress();
        setTimeout(type, 30);
      }else{
        text.textContent += "\n";
        line++;
        char = 0;
        myakyBot.classList.remove("talking");
        updateProgress();
        setTimeout(type, 280);
      }
    }

    skipBtn.addEventListener("click", cinematicEnter);

    setTimeout(type, 700);
  </script>
</body>
</html>
