s<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Escolar Completo</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

.topo{
    background: rgba(0,0,0,0.4);
    padding: 15px;
    font-size: 28px;
    font-weight: bold;
}

#relogio{
    font-size: 80px;
    margin: 10px;
}

.turno{
    font-size: 30px;
    color: #00e5ff;
}

.grade{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:15px;
    padding:20px;
}

.card{
    background: rgba(0,0,0,0.3);
    padding:15px;
    border-radius:10px;
}

.titulo{
    font-size:20px;
}

.valor{
    font-size:28px;
    color: #00e5ff;
}

#alerta{
    font-size:35px;
    color:yellow;
    display:none;
    animation: piscar 1s infinite;
}

@keyframes piscar{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

button{
    padding:10px 20px;
    font-size:16px;
    border-radius:10px;
    border:none;
    background:#00c853;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topo">PAINEL ESCOLAR - TODOS OS TURNOS</div>
<div id="relogio">00:00:00</div>
<div class="turno" id="turno">Turno: --</div>

<div class="grade">
    <div class="card">
        <div class="titulo">Aula Atual</div>
        <div class="valor" id="aulaAtual">--</div>
    </div>

    <div class="card">
        <div class="titulo">Próxima Aula</div>
        <div class="valor" id="proximaAula">--</div>
    </div>

    <div class="card">
        <div class="titulo">Tempo Restante</div>
        <div class="valor" id="contador">00:00</div>
    </div>

    <div class="card">
        <div class="titulo">Status</div>
        <div class="valor" id="status">--</div>
    </div>
</div>

<button onclick="telaCheia()">Tela Cheia</button>

<div id="alerta"></div>

<audio id="som" src="https://www.soundjay.com/school/school-bell.mp3"></audio>

<script>
// TODOS OS TURNOS
let horarios = [
    // MANHÃ
    {aula:"1ª Aula", inicio:"07:30", fim:"08:20", turno:"Manhã"},
    {aula:"2ª Aula", inicio:"08:25", fim:"09:15", turno:"Manhã"},
    {aula:"3ª Aula", inicio:"09:20", fim:"10:10", turno:"Manhã"},
    {aula:"Intervalo", inicio:"10:10", fim:"10:30", turno:"Manhã"},
    {aula:"4ª Aula", inicio:"10:30", fim:"11:20", turno:"Manhã"},
    {aula:"5ª Aula", inicio:"11:25", fim:"12:15", turno:"Manhã"},

    // TARDE
    {aula:"1ª Aula", inicio:"13:00", fim:"13:50", turno:"Tarde"},
    {aula:"2ª Aula", inicio:"13:55", fim:"14:45", turno:"Tarde"},
    {aula:"3ª Aula", inicio:"14:50", fim:"15:40", turno:"Tarde"},
    {aula:"Intervalo", inicio:"15:40", fim:"16:00", turno:"Tarde"},
    {aula:"4ª Aula", inicio:"16:00", fim:"16:50", turno:"Tarde"},
    {aula:"5ª Aula", inicio:"16:55", fim:"17:45", turno:"Tarde"},

    // NOITE
    {aula:"1ª Aula", inicio:"18:30", fim:"19:20", turno:"Noite"},
    {aula:"2ª Aula", inicio:"19:20", fim:"20:10", turno:"Noite"},
    {aula:"Intervalo", inicio:"20:10", fim:"20:25", turno:"Noite"},
    {aula:"3ª Aula", inicio:"20:25", fim:"21:15", turno:"Noite"},
    {aula:"4ª Aula", inicio:"21:15", fim:"22:05", turno:"Noite"}
];

function atualizarRelogio(){
    let agora = new Date();
    let h = String(agora.getHours()).padStart(2,'0');
    let m = String(agora.getMinutes()).padStart(2,'0');
    let s = String(agora.getSeconds()).padStart(2,'0');
    document.getElementById("relogio").innerText = h+":"+m+":"+s;

    verificarHorario(h+":"+m, agora);
}

function verificarHorario(hora, agora){
    let aulaAtual="--";
    let proximaAula="--";
    let status="Fora de aula";
    let contador="00:00";
    let turnoAtual="--";

    for(let i=0;i<horarios.length;i++){
        if(hora >= horarios[i].inicio && hora < horarios[i].fim){
            aulaAtual = horarios[i].aula;
            turnoAtual = horarios[i].turno;
            status = horarios[i].aula == "Intervalo" ? "INTERVALO" : "EM AULA";

            if(i+1 < horarios.length){
                proximaAula = horarios[i+1].aula;
            }

            let fim = new Date();
            let [hf,mf] = horarios[i].fim.split(":");
            fim.setHours(hf);
            fim.setMinutes(mf);
            fim.setSeconds(0);

            let diff = fim - agora;
            let min = Math.floor(diff/60000);
            let sec = Math.floor((diff%60000)/1000);
            contador = String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');

            if(diff <= 60000){
                tocarAlerta("TROCA DE AULA!");
            }
        }
    }

    document.getElementById("aulaAtual").innerText = aulaAtual;
    document.getElementById("proximaAula").innerText = proximaAula;
    document.getElementById("status").innerText = status;
    document.getElementById("contador").innerText = contador;
    document.getElementById("turno").innerText = "Turno: " + turnoAtual;
}

function tocarAlerta(msg){
    let alerta = document.getElementById("alerta");
    let som = document.getElementById("som");

    alerta.style.display = "block";
    alerta.innerText = msg;
    som.play();
}

function telaCheia(){
    document.documentElement.requestFullscreen();
}

setInterval(atualizarRelogio, 1000);
</script>

</body>
  </html>
