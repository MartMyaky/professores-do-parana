<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nexus Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 background:#0a0a0f;
 color:white;
 font-family:Arial;
 overflow-x:hidden;
}

/* INTRO */
#intro{
 position:fixed;
 width:100%;height:100%;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:9999;
 flex-direction:column;
}

#logo{
 width:500px;
 opacity:0;
 filter:drop-shadow(0 0 30px #a855f7);
 animation:logoIn 2s ease forwards;
}

.light{
 position:absolute;
 width:300px;height:300px;
 background:radial-gradient(circle,#a855f7,transparent);
 animation:light 2s ease;
}

@keyframes logoIn{
 from{opacity:0; transform:scale(0.5)}
 to{opacity:1; transform:scale(1)}
}

@keyframes light{
 from{opacity:0; transform:scale(0.2)}
 to{opacity:1; transform:scale(3)}
}

/* HEADER */
header{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:rgba(0,0,0,0.7);
 backdrop-filter:blur(10px);
 position:sticky;
 top:0;
}

#search{
 padding:10px;
 border-radius:20px;
 border:none;
 width:250px;
}

/* HERO */
.hero{
 height:50vh;
 display:flex;
 align-items:center;
 padding:40px;
 background:linear-gradient(to right,#000,transparent),
 url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');
 background-size:cover;
}

.hero h1{
 font-size:40px;
}

/* ROWS */
.row{
 padding:20px;
}

.cards{
 display:flex;
 gap:10px;
 overflow-x:auto;
}

.card{
 min-width:200px;
 border-radius:10px;
 overflow:hidden;
 background:#111;
 cursor:pointer;
 transition:0.3s;
 position:relative;
}

.card:hover{
 transform:scale(1.15);
}

.card img{
 width:100%;
}

.card p{
 padding:5px;
 font-size:14px;
}

/* PLAYER */
.player iframe{
 width:100%;
 height:400px;
 border:none;
 margin-top:10px;
}

/* GLOW UI */
.glow{
 box-shadow:0 0 20px #a855f7;
}

/* FADE */
.fade{
 animation:fadeOut 2s forwards;
}

@keyframes fadeOut{
 to{opacity:0;visibility:hidden}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
 <div class="light"></div>
 <img src="logo.png" id="logo">
 <audio id="sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
</div>

<!-- SITE -->
<header>
 <h2>NEXUS</h2>
 <input id="search" placeholder="Buscar...">
</header>

<div class="hero">
 <div>
  <h1>Bem-vindo ao Nexus</h1>
  <p>Streaming nível Hollywood</p>
 </div>
</div>

<div class="player" id="player"></div>

<div class="row">
 <h2>🔥 Tendências</h2>
 <div class="cards" id="trend"></div>
</div>

<div class="row">
 <h2>🎬 Filmes</h2>
 <div class="cards" id="filmes"></div>
</div>

<div class="row">
 <h2>🎌 Animes</h2>
 <div class="cards" id="animes"></div>
</div>

<script>
const KEY = "AIzaSyAbJX9WQwxIO2DP-ud_3kCzDCJ-5MqjxU4";

// INTRO CINEMA
window.onload = ()=>{
 setTimeout(()=>{document.getElementById('sound').play()},800);

 setTimeout(()=>{
  document.getElementById('intro').classList.add('fade');
 },5000);

 setTimeout(()=>{
  document.getElementById('intro').style.display='none';
 },7000);
};

// PLAYER
function play(id){
 player.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
 window.scrollTo({top:0,behavior:'smooth'});
}

// CARD
function createCard(v){
 let d=document.createElement('div');
 d.className='card glow';
 d.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}">
 <p>${v.snippet.title}</p>`;
 d.onclick=()=>play(v.id.videoId);
 return d;
}

// LOAD
async function load(q,id){
 let r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=10&key=${KEY}`);
 let data=await r.json();

 let c=document.getElementById(id);
 c.innerHTML="";
 data.items.forEach(v=>c.appendChild(createCard(v)));
}

// SEARCH
search.oninput=()=>{
 if(search.value.length>2){
  load(search.value,"trend");
 }
};

// INIT
load("filmes","trend");
load("filmes completos","filmes");
load("anime","animes");
</script>

</body>
</html>
