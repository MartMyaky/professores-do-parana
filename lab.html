<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratório Educacional com Base de Conhecimento</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(180deg,#0b1e34,#102845);
    color:#fff;
}
header{
    background:#142a46;
    padding:24px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}
.container{
    max-width:1200px;
    margin:auto;
    padding:24px;
}
.section{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
    margin-top:24px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:16px;
}
label{
    display:block;
    margin:10px 0 6px;
    font-weight:bold;
}
select,input,textarea{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:15px;
}
textarea{
    min-height:90px;
    resize:vertical;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#2a7fff;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
    margin:6px 6px 0 0;
}
button:hover{
    background:#1664da;
}
.output{
    background:#fff;
    color:#000;
    padding:15px;
    border-radius:10px;
    margin-top:16px;
    white-space:pre-wrap;
    min-height:140px;
    line-height:1.55;
}
.small{
    font-size:14px;
    color:#d6e5ff;
}
</style>
</head>
<body>

<header>🧠 Laboratório Educacional com Base de Conhecimento</header>

<div class="container">

    <div class="section">
        <h2>📚 Gerador Inteligente com Base de Conhecimento</h2>
        <div class="small">Escolha a matéria, depois a área, depois o subtema. O sistema usa sua base para montar a atividade.</div>

        <div class="grid">
            <div>
                <label>📚 Matéria</label>
                <select id="materia" onchange="carregarAreas()">
                    <option value="">Selecione</option>
                    <option>Português</option>
                    <option>História</option>
                    <option>Ciências</option>
                </select>
            </div>

            <div>
                <label>🧩 Área</label>
                <select id="area" onchange="carregarSubtemas()">
                    <option value="">Selecione uma matéria primeiro</option>
                </select>
            </div>

            <div>
                <label>🧠 Subtema</label>
                <select id="subtema">
                    <option value="">Selecione uma área primeiro</option>
                </select>
            </div>

            <div>
                <label>🎓 Ano escolar</label>
                <select id="ano">
                    <option>1º Ano</option>
                    <option>2º Ano</option>
                    <option>3º Ano</option>
                    <option>4º Ano</option>
                    <option>5º Ano</option>
                    <option>6º Ano</option>
                    <option>7º Ano</option>
                    <option>8º Ano</option>
                    <option>9º Ano</option>
                    <option>1º Ano EM</option>
                    <option>2º Ano EM</option>
                    <option>3º Ano EM</option>
                </select>
            </div>

            <div>
                <label>📑 Tipo de atividade</label>
                <select id="tipo">
                    <option>Lista de exercícios</option>
                    <option>Revisão</option>
                    <option>Tarefa de casa</option>
                    <option>Atividade diagnóstica</option>
                    <option>Simulado</option>
                    <option>Reforço escolar</option>
                </select>
            </div>

            <div>
                <label>🔢 Quantidade de questões</label>
                <select id="qtd">
                    <option>5</option>
                    <option>10</option>
                    <option>15</option>
                </select>
            </div>
        </div>

        <label>📝 Tema livre / observação do professor</label>
        <input id="temaLivre" placeholder="Ex: foco em interpretação, atividade mais simples, revisão para prova">

        <div style="margin-top:10px;">
            <button onclick="gerarAtividadeBase()">Gerar atividade</button>
            <button onclick="gerarGabaritoBase()">Gerar gabarito</button>
            <button onclick="exportarAtividadeBase()">Exportar atividade</button>
        </div>

        <div class="output" id="saidaAtividade">A atividade aparecerá aqui.</div>
        <div class="output" id="saidaGabarito">O gabarito aparecerá aqui.</div>
    </div>
</div>

let gabaritoAtual = [];

function carregarAreas(){
    const materia = document.getElementById("materia").value;
    const area = document.getElementById("area");
    const subtema = document.getElementById("subtema");

    area.innerHTML = "";
    subtema.innerHTML = '<option value="">Selecione uma área primeiro</option>';

    if(!materia || !baseConhecimento[materia]){
        area.innerHTML = '<option value="">Selecione uma matéria primeiro</option>';
        return;
    }

    area.innerHTML = '<option value="">Selecione</option>';
    Object.keys(baseConhecimento[materia]).forEach(item => {
        area.innerHTML += `<option>${item}</option>`;
    });
}

function carregarSubtemas(){
    const materia = document.getElementById("materia").value;
    const area = document.getElementById("area").value;
    const subtema = document.getElementById("subtema");

    subtema.innerHTML = "";

    if(!materia || !area || !baseConhecimento[materia] || !baseConhecimento[materia][area]){
        subtema.innerHTML = '<option value="">Selecione uma área primeiro</option>';
        return;
    }

    subtema.innerHTML = '<option value="">Selecione</option>';
    baseConhecimento[materia][area].forEach(item => {
        subtema.innerHTML += `<option>${item}</option>`;
    });
}

function gerarAtividadeBase(){
    const materia = document.getElementById("materia").value;
    const area = document.getElementById("area").value;
    const subtema = document.getElementById("subtema").value;
    const ano = document.getElementById("ano").value;
    const tipo = document.getElementById("tipo").value;
    const qtd = parseInt(document.getElementById("qtd").value);
    const temaLivre = document.getElementById("temaLivre").value.trim();

    if(!materia || !area){
        document.getElementById("saidaAtividade").textContent = "Selecione a matéria e a área.";
        return;
    }

    const listaConteudos = baseConhecimento[materia][area] || [];
    const baseQuestoes = subtema ? [subtema, ...listaConteudos.filter(x => x !== subtema)] : listaConteudos;

    let texto = "📚 " + tipo.toUpperCase() + "\n\n";
    texto += "Matéria: " + materia + "\n";
    texto += "Área: " + area + "\n";
    texto += "Subtema: " + (subtema || "Geral da área") + "\n";
    texto += "Ano escolar: " + ano + "\n";
    if(temaLivre) texto += "Observação do professor: " + temaLivre + "\n";
    texto += "\nCONTEÚDOS DE APOIO:\n";

    baseQuestoes.slice(0, Math.min(8, baseQuestoes.length)).forEach((item, i) => {
        texto += (i + 1) + ". " + item + "\n";
    });

    texto += "\nQUESTÕES:\n\n";
    gabaritoAtual = [];

    for(let i = 0; i < qtd; i++){
        const conteudo = baseQuestoes[i % baseQuestoes.length];
        const questao = montarQuestao(materia, area, conteudo, i + 1);
        texto += (i + 1) + ") " + questao.pergunta + "\n\n";
        gabaritoAtual.push((i + 1) + ") " + questao.resposta);
    }

    document.getElementById("saidaAtividade").textContent = texto;
    document.getElementById("saidaGabarito").textContent = "Clique em \"Gerar gabarito\".";
}

function montarQuestao(materia, area, conteudo, numero){
    if(materia === "Português"){
        const modelos = [
            {
                pergunta: "Explique com suas palavras o que é \"" + conteudo + "\".",
                resposta: "Resposta esperada: definição correta de " + conteudo + "."
            },
            {
                pergunta: "Escreva um exemplo relacionado a \"" + conteudo + "\".",
                resposta: "Resposta pessoal com exemplo coerente de " + conteudo + "."
            },
            {
                pergunta: "Produza uma frase ou pequeno texto usando o conteúdo \"" + conteudo + "\".",
                resposta: "Resposta pessoal. Avaliar uso correto de " + conteudo + "."
            },
            {
                pergunta: "Diga por que \"" + conteudo + "\" é importante no estudo de " + area + ".",
                resposta: "Resposta pessoal. Espera-se justificativa coerente."
            }
        ];
        return modelos[(numero - 1) % modelos.length];
    }

    if(materia === "História"){
        const modelos = [
            {
                pergunta: "Explique o significado histórico de \"" + conteudo + "\".",
                resposta: "Resposta esperada: explicação histórica coerente sobre " + conteudo + "."
            },
            {
                pergunta: "Cite uma característica importante de \"" + conteudo + "\".",
                resposta: "Resposta esperada: ao menos uma característica correta de " + conteudo + "."
            },
            {
                pergunta: "Relacione \"" + conteudo + "\" com a área \"" + area + "\".",
                resposta: "Resposta pessoal. Deve mostrar relação histórica correta."
            },
            {
                pergunta: "Por que \"" + conteudo + "\" é importante para entender a História?",
                resposta: "Resposta pessoal. Espera-se reflexão coerente."
            }
        ];
        return modelos[(numero - 1) % modelos.length];
    }

    if(materia === "Ciências"){
        const modelos = [
            {
                pergunta: "Defina o conceito de \"" + conteudo + "\".",
                resposta: "Resposta esperada: definição correta de " + conteudo + "."
            },
            {
                pergunta: "Dê um exemplo de aplicação ou ocorrência de \"" + conteudo + "\".",
                resposta: "Resposta pessoal com exemplo coerente de " + conteudo + "."
            },
            {
                pergunta: "Explique a importância de \"" + conteudo + "\" no estudo de " + area + ".",
                resposta: "Resposta pessoal. Espera-se explicação coerente."
            },
            {
                pergunta: "Descreva o que acontece em \"" + conteudo + "\".",
                resposta: "Resposta esperada: descrição adequada do conteúdo."
            }
        ];
        return modelos[(numero - 1) % modelos.length];
    }

    return {
        pergunta: "Explique o conteúdo \"" + conteudo + "\".",
        resposta: "Resposta pessoal."
    };
}

function gerarGabaritoBase(){
    if(!gabaritoAtual.length){
        document.getElementById("saidaGabarito").textContent = "Primeiro gere uma atividade.";
        return;
    }
    document.getElementById("saidaGabarito").textContent = "✅ GABARITO\n\n" + gabaritoAtual.join("\n");
}

function exportarAtividadeBase(){
    const conteudo = document.getElementById("saidaAtividade").textContent;
    const w = window.open("", "_blank");
    w.document.write("<html><head><title>Atividade</title></head><body><pre style='font-family:Arial;white-space:pre-wrap;'>" + conteudo + "</pre></body></html>");
    w.document.close();
    w.print();
}
</script>
